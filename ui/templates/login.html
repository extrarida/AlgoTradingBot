<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoTrader — Connect</title>
<link rel="stylesheet" href="/static/css/styling.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(34,211,165,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(34,211,165,0.025) 1px,transparent 1px); background-size:44px 44px; pointer-events:none; }
  .card { width: 390px; position: relative; z-index: 1; animation: rise 0.45s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .login-logo { display:flex; align-items:center; gap:0.7rem; margin-bottom:1.5rem; }
  .login-logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1rem; }
  .login-logo-name { font-size:1rem; font-weight:700; letter-spacing:-0.01em; }
  .login-logo-sub { font-size:0.68rem; color:var(--muted); font-family:var(--mono); margin-top:0.1rem; }
  h1 { font-size:1.2rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.25rem; }
  .subtitle { font-size:0.82rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }
  .demo-pill { display:inline-flex; align-items:center; gap:0.35rem; background:rgba(34,211,165,0.08); border:1px solid rgba(34,211,165,0.18); color:var(--accent); font-family:var(--mono); font-size:0.72rem; padding:0.25rem 0.6rem; border-radius:20px; margin-bottom:1.25rem; }
  .demo-pill::before { content:''; width:5px; height:5px; background:var(--accent); border-radius:50%; animation:blink 2.5s ease-in-out infinite; }
  .field { margin-bottom:0.875rem; }
  label { display:block; font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:0.3rem; }
  input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.575rem 0.8rem; color:var(--text); font-family:var(--mono); font-size:0.875rem; outline:none; transition:border-color 0.12s,box-shadow 0.12s; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(34,211,165,0.08); }
  input::placeholder { color:var(--muted); }
  .btn-connect { width:100%; padding:0.65rem; margin-top:0.25rem; border:none; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#0b0f1a; font-family:var(--sans); font-size:0.875rem; font-weight:700; cursor:pointer; transition:all 0.12s; }
  .btn-connect:hover { transform:translateY(-1px); box-shadow:0 5px 18px rgba(34,211,165,0.2); }
  .btn-connect:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .error-msg { background:rgba(244,63,94,0.08); border:1px solid rgba(244,63,94,0.2); color:#fca5a5; border-radius:var(--radius-sm); padding:0.575rem 0.8rem; font-size:0.78rem; font-family:var(--mono); margin-top:0.75rem; display:none; line-height:1.5; }
  .spinner { display:none; width:15px; height:15px; border:2px solid rgba(11,15,26,0.3); border-top-color:#0b0f1a; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="card">
  <div class="login-logo">
    <div class="login-logo-icon">⚡</div>
    <div>
      <div class="login-logo-name">AlgoTrader</div>
      <div class="login-logo-sub">v2.0 · 40-Strategy Engine</div>
    </div>
  </div>
  <h1>Connect to Broker</h1>
  <p class="subtitle">Enter your MT5 credentials to begin trading.</p>
  <div class="demo-pill">Mock mode — any credentials will work</div>
  <form id="loginForm">
    <div class="field">
      <label>Account Number</label>
      <input type="number" id="login" placeholder="e.g. 12345678" value="12345678" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your MT5 password" value="demo" required>
    </div>
    <div class="field">
      <label>Broker Server</label>
      <input type="text" id="server" placeholder="e.g. ICMarkets-Demo" value="MockBroker" required>
    </div>
    <button type="submit" class="btn-connect" id="connectBtn">
      <span id="btnText">Connect to MT5</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>
<script>
  const API = 'http://localhost:8000';
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn=document.getElementById('connectBtn'), btnText=document.getElementById('btnText');
    const spinner=document.getElementById('spinner'), errMsg=document.getElementById('errorMsg');
    btn.disabled=true; btnText.style.display='none'; spinner.style.display='block'; errMsg.style.display='none';
    try {
      const res = await fetch(`${API}/api/connect`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ login:parseInt(document.getElementById('login').value), password:document.getElementById('password').value, server:document.getElementById('server').value })
      });
      const data = await res.json();
      if (res.ok && data.success) { localStorage.setItem('account', JSON.stringify(data.account)); window.location.href='/dashboard'; }
      else throw new Error(data.detail||'Connection failed');
    } catch(err) {
      errMsg.textContent=err.message; errMsg.style.display='block';
      btn.disabled=false; btnText.style.display='block'; spinner.style.display='none';
    }
  });
</script>
</body>
</html>
